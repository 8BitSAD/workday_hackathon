<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility Prompt</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 24px;
            color: #1f2937;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Do you want to make this web page easier for you?</h1>
        <button type="button">Yes, make it easier</button>
    </div>

</body>


</html>
